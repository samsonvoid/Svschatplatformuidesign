<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#0033aa" />
    </linearGradient>
    
    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e8ff" />
    </linearGradient>
    
    <!-- Drop Shadow Filter for the logo -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Ring (Subtle Glow) -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="6" />

  <!-- Logo Graphics: Modern Connection Nodes/Chat Bubbles (Centered) -->
  <g filter="url(#shadow)">
    <!-- Node Left -->
    <circle cx="190" cy="256" r="54" fill="url(#logoGrad)" />
    <!-- Node Right -->
    <circle cx="322" cy="256" r="54" fill="url(#logoGrad)" />
    <!-- Center Node (Interconnected upper) -->
    <circle cx="256" cy="180" r="46" fill="url(#logoGrad)" />
    
    <!-- Interconnecting bridges to show "collaboration/hub" -->
    <path d="M 190 256 L 256 180 L 322 256 Z" fill="url(#logoGrad)" />
    
    <!-- Speech bubble indicators (Subtle modern dots) -->
    <circle cx="190" cy="256" r="12" fill="#004ad3" />
    <circle cx="322" cy="256" r="12" fill="#004ad3" />
    <circle cx="256" cy="180" r="10" fill="#004ad3" />
  </g>
  
  <!-- Sleek Text Label -->
  <text x="256" y="420" font-family="'Geist', 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="38" fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0.95">COLLABHUB</text>
</svg>
